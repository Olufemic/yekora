<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Browse Auctions — Yekoraa</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav class="nav">
  <div class="wrap">
    <a href="index.html" class="nav-brand">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 4l6 6-8.5 8.5a2.12 2.12 0 0 1-3-3L17 6.5"/><path d="M17.5 6.5 20 4l-2.5-2.5"/><path d="M2.5 21.5 8 16"/><path d="M6 19l3-3"/></svg>
      YEKORAA
    </a>
    <div class="nav-links">
      <a href="auctions.html" class="active">Browse</a>
      <a href="sell.html">Sell an item</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="how-it-works.html">How it works</a>
    </div>
    <div class="nav-right">
      <div class="nav-bell">🔔<span class="dot"></span></div>
      <span class="btn-signin">Sign in</span>
      <button class="nav-toggle" aria-label="Menu">☰</button>
    </div>
  </div>
</nav>

<section class="wrap" style="padding-top:40px;">
  <div class="section-head">
    <h2>Browse auctions</h2>
    <span class="section-tag" id="result-count"></span>
  </div>

  <div class="browse-layout">
    <aside class="filters">
      <div class="search-bar" style="margin-bottom:24px;">
        <input class="input" id="f-search" type="text" placeholder="Search items…" />
      </div>

      <div class="filter-group">
        <h4>Category</h4>
        <label><input type="checkbox" class="f-category" value="Electronics" /> Electronics</label>
        <label><input type="checkbox" class="f-category" value="Fashion" /> Fashion</label>
        <label><input type="checkbox" class="f-category" value="Home &amp; Appliances" /> Home &amp; Appliances</label>
        <label><input type="checkbox" class="f-category" value="Art &amp; Antiques" /> Art &amp; Antiques</label>
      </div>

      <div class="filter-group">
        <h4>Condition</h4>
        <label><input type="radio" name="f-condition" class="f-condition" value="" checked /> Any</label>
        <label><input type="radio" name="f-condition" class="f-condition" value="New" /> New</label>
        <label><input type="radio" name="f-condition" class="f-condition" value="Used" /> Used</label>
      </div>

      <div class="filter-group">
        <h4>Max current bid</h4>
        <input class="input" id="f-price" type="range" min="10000" max="600000" step="5000" value="600000" />
        <div class="muted" id="f-price-label" style="font-size:12px; margin-top:6px;">Up to ₦600,000</div>
      </div>

      <button class="btn btn-outline btn-block" id="f-reset">Reset filters</button>
    </aside>

    <div>
      <div class="grid" id="auctions-grid"></div>
      <p class="muted" id="empty-msg" style="display:none; text-align:center; padding:40px 0;">No auctions match your filters — try widening your search.</p>
    </div>
  </div>
</section>

<footer class="footer wrap">
  <span>Yekoraa demo — interactive mockup, not connected to live payments</span>
  <span>Built as a walkthrough →</span>
</footer>

<script src="js/data.js"></script>
<script src="js/main.js"></script>
<script>
  let liveHandle = null;

  function applyFilters() {
    const q = document.getElementById("f-search").value.trim().toLowerCase();
    const cats = Array.from(document.querySelectorAll(".f-category:checked")).map((c) => c.value);
    const condition = document.querySelector(".f-condition:checked").value;
    const maxPrice = Number(document.getElementById("f-price").value);

    const filtered = YEKORAA_AUCTIONS.filter((a) => {
      if (q && !a.title.toLowerCase().includes(q) && !a.seller.toLowerCase().includes(q)) return false;
      if (cats.length && !cats.includes(a.category)) return false;
      if (condition && !a.condition.includes(condition)) return false;
      if (a.bid > maxPrice) return false;
      return true;
    });

    document.getElementById("result-count").textContent = `${filtered.length} result${filtered.length === 1 ? "" : "s"}`;
    document.getElementById("empty-msg").style.display = filtered.length ? "none" : "block";

    if (liveHandle) clearInterval(liveHandle.intervalId);
    yekRenderGrid("auctions-grid", filtered);
    liveHandle = yekRunLiveCards(filtered);
  }

  document.getElementById("f-search").addEventListener("input", applyFilters);
  document.querySelectorAll(".f-category").forEach((el) => el.addEventListener("change", applyFilters));
  document.querySelectorAll(".f-condition").forEach((el) => el.addEventListener("change", applyFilters));
  document.getElementById("f-price").addEventListener("input", (e) => {
    document.getElementById("f-price-label").textContent = "Up to " + yekFmtNaira(e.target.value);
    applyFilters();
  });
  document.getElementById("f-reset").addEventListener("click", () => {
    document.getElementById("f-search").value = "";
    document.querySelectorAll(".f-category").forEach((c) => (c.checked = false));
    document.querySelector('.f-condition[value=""]').checked = true;
    document.getElementById("f-price").value = 600000;
    document.getElementById("f-price-label").textContent = "Up to ₦600,000";
    applyFilters();
  });

  applyFilters();
</script>
</body>
</html>
